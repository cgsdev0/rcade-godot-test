name: Deploy to RCade

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    name: Build and Deploy to RCade
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

          # --- my changes
          
      - name: export game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          relative_project_path: ./
          use_preset_export_path: true
          cache: true

      - run: find .

      - uses: actions/upload-artifact@v7
        with:
          name: build.zip
          path: ./builds/html/rcade/*

        # --- end my changes
        #
      - name: Deploy to RCade
        uses: fcjr/rcade/action-deploy@main
        with:
          artifactPath: ./builds/html/rcade/
