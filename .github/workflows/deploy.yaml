name: Deploy to RCade

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    name: Build and Deploy to RCade
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

          # --- my changes
      - name: export game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=linux.x86_64.zip&platform=linux.64
          godot_export_templates_download_url: https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=export_templates.tpz&platform=templates
          relative_project_path: ./
          use_preset_export_path: true
          cache: true

      - run: find .
        # --- end my changes

      - name: Deploy to RCade
        uses: fcjr/rcade/action-deploy@main
        with:
          artifactPath: ./builds/html/rcade/
